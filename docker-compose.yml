# ============================================================
# Joory — Docker Compose (production)
#
# 1. Copy .env.production.example → .env
# 2. Fill in secrets
# 3. docker compose up -d
# ============================================================

services:
  # ---- PostgreSQL 17 ----
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-joory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-joory}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-joory}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- API (Hono on Bun) ----
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-joory}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-joory}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?Set OPENROUTER_API_KEY in .env}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://api.joory.chat}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-"https://api.joory.chat,https://joory.chat"}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      PORT: "3001"
      NODE_ENV: production
    expose:
      - "3001"

  # ---- Web (SvelteKit on Bun) ----
  web:
    build:
      context: .
      target: web
      args:
        PUBLIC_API_BASE: ${PUBLIC_API_BASE:-https://api.joory.chat}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: "3000"
      PUBLIC_API_BASE: ${PUBLIC_API_BASE:-https://api.joory.chat}
      NODE_ENV: production
    expose:
      - "3000"

  # ---- Caddy (reverse proxy + auto TLS) ----
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
